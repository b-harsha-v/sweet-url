<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet URL | Enterprise Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2">
            Sweet URL
        </h1>
        <p class="text-gray-400 mb-8">Paste your long link below to create a lightning-fast short alias.</p>

        <form id="shortenForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Destination URL *</label>
                <input type="url" id="long_url" required placeholder="https://github.com/" 
                       class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Custom Alias (Optional)</label>
                    <input type="text" id="custom_alias" placeholder="e.g., my-github" 
                           class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Expires In (Optional)</label>
                    <select id="expires_in" class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 focus:ring-2 focus:ring-blue-500 focus:outline-none transition appearance-none">
                        <option value="">Never</option>
                        <option value="1">1 Hour</option>
                        <option value="24">24 Hours</option>
                        <option value="168">7 Days</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg transform transition hover:-translate-y-0.5">
                Shorten URL
            </button>
        </form>

        <div id="resultBox" class="mt-8 hidden p-5 bg-gray-900 rounded-lg border border-green-500/30">
            <p class="text-sm text-green-400 font-semibold mb-1">Success! Your short link is ready:</p>
            <div class="flex items-center justify-between bg-gray-800 p-3 rounded">
                <a id="shortLink" href="#" target="_blank" class="text-blue-400 hover:text-blue-300 font-mono truncate mr-4"></a>
            </div>
        </div>

        <div id="errorBox" class="mt-4 hidden p-4 bg-red-900/50 border border-red-500 rounded-lg text-red-200 text-sm"></div>
    </div>

    <script>
        document.getElementById('shortenForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const longUrl = document.getElementById('long_url').value;
            const customAlias = document.getElementById('custom_alias').value;
            const expiresIn = document.getElementById('expires_in').value;

            const payload = { long_url: longUrl };
            if (customAlias) payload.custom_alias = customAlias;
            if (expiresIn) payload.expires_in_hours = parseInt(expiresIn);

            try {
                const response = await fetch('/api/v1/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('errorBox').classList.add('hidden');
                    document.getElementById('resultBox').classList.remove('hidden');
                    const linkElement = document.getElementById('shortLink');
                    linkElement.href = data.short_url;
                    linkElement.textContent = data.short_url;
                } else {
                    throw new Error(data.detail || "Something went wrong.");
                }
            } catch (error) {
                document.getElementById('resultBox').classList.add('hidden');
                const errorBox = document.getElementById('errorBox');
                errorBox.classList.remove('hidden');
                errorBox.textContent = error.message;
            }
        });
    </script>
</body>
</html>
